<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vibix Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden !important;
            font-family: Arial, sans-serif;
        }

        body * {
            display: none !important;
        }

        #app,
        #app * {
            display: block !important;
        }

        #app {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: #000 !important;
            z-index: 999999 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .player-slot {
            display: block !important;
            width: 100% !important;
            height: 100% !important;
            position: static !important;
        }

        .error {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            display: flex !important;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 24px;
            text-align: center;
            line-height: 1.5;
            font-size: 18px;
        }
    </style>
    <script src="https://graphicslab.io/sdk/v2/rendex-sdk.min.js"></script>
</head>
<body>
<div id="app"></div>

<script>
    // Запрос полноэкранного режима при загрузке
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(err => {
            console.log('Полноэкран недоступен:', err);
        });
    }

    var lastRoute = null;

    function checkRouteChange() {
        var path = window.location.pathname + window.location.hash + window.location.search;
        if (lastRoute && lastRoute !== path) {
            window.location.reload();
        }
        lastRoute = path;
    }

    window.addEventListener('hashchange', checkRouteChange);
    window.addEventListener('popstate', checkRouteChange);

    setInterval(checkRouteChange, 500);

    (function () {
        var app = document.getElementById("app");

        function parseRoute() {
            var path = window.location.pathname;
            var marker = "vibix.html";
            var index = path.indexOf(marker);

            if (index !== -1) {
                var tail = path.slice(index + marker.length);
                var parts = tail.split("/").filter(Boolean);
                if (parts.length >= 2 && (parts[0] === "m" || parts[0] === "t")) {
                    return { mode: parts[0], id: parts[1] };
                }
            }

            var params = new URLSearchParams(window.location.search);
            var queryMode = params.get("type");
            var queryId = params.get("id");
            if ((queryMode === "m" || queryMode === "t") && queryId) {
                return { mode: queryMode, id: queryId };
            }

            var hash = window.location.hash.replace(/^#/, "");
            var hashParts = hash.split("/").filter(Boolean);
            if (hashParts.length >= 2 && (hashParts[0] === "m" || hashParts[0] === "t")) {
                return { mode: hashParts[0], id: hashParts[1] };
            }

            return null;
        }

        var route = parseRoute();

        if (!route || !/^\d+$/.test(route.id)) {
            app.innerHTML = '<div class="error">Некорректная ссылка.<br>Фильм: /vibix.html/m/326<br>Сериал: /vibix.html/t/326<br><br>Для Live Server используйте:<br>/vibix.html#/m/326<br>или /vibix.html?type=m&id=326</div>';
            return;
        }

        var contentType = "kp";

        app.innerHTML =
            '<ins class="player-slot" ' +
            'style="width: 100%; height: 100%; display: block;" ' +
            'data-publisher-id="668762759" ' +
            'data-type="' + contentType + '" ' +
            'data-id="' + route.id + '" ' +
            'data-width="100%" ' +
            'data-height="100%"></ins>';
    })();
</script>
</body>
</html>
